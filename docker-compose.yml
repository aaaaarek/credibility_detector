services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000"

  ui:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             streamlit run app/ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501"
    depends_on:
      - api
